name: Apply verified hardening iteration

on:
  push:
    branches:
      - agent/harden-manifest-import
    paths:
      - scripts/apply_hardening_iteration.py
      - .github/workflows/apply-hardening-iteration.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-manifest-import
          fetch-depth: 0

      - name: Apply focused patch
        run: python3 scripts/apply_hardening_iteration.py

      - name: Validate manifests
        run: python3 tests/validate_module_manifests.py

      - name: Validate existing helper logic
        run: python3 tests/test_html_helpers.py

      - name: Validate hardening regressions
        run: python3 tests/test_hardening_guards.py

      - name: Validate embedded JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('dashboard-studio-ultimate-pro-v3.1.0.html').read_text(encoding='utf-8')
          script = source.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/dashboard-app.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/dashboard-app.js

      - name: Remove one-time automation
        run: rm scripts/apply_hardening_iteration.py .github/workflows/apply-hardening-iteration.yml

      - name: Commit verified result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden manifest identity and import persistence"
          git push origin HEAD:agent/harden-manifest-import
