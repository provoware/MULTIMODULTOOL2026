name: Run verified hardening branch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/run-hardening-branch.yml

permissions:
  contents: write

jobs:
  apply-verify-clean:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v4
        with:
          ref: agent/harden-manifest-import
          fetch-depth: 0

      - name: Apply focused patch
        run: python3 scripts/apply_hardening_iteration.py

      - name: Validate manifests
        run: python3 tests/validate_module_manifests.py

      - name: Validate helper logic
        run: python3 tests/test_html_helpers.py

      - name: Validate hardening regressions
        run: python3 tests/test_hardening_guards.py

      - name: Validate embedded JavaScript syntax
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('dashboard-studio-ultimate-pro-v3.1.0.html').read_text(encoding='utf-8')
          script = source.rsplit('<script>', 1)[1].split('</script>', 1)[0]
          Path('/tmp/dashboard-app.js').write_text(script, encoding='utf-8')
          PY
          node --check /tmp/dashboard-app.js

      - name: Commit verified branch result
        run: |
          rm scripts/apply_hardening_iteration.py .github/workflows/apply-hardening-iteration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Harden manifest identity and import persistence"
          git push origin HEAD:agent/harden-manifest-import

      - name: Remove one-time starter from main
        if: success()
        run: |
          git fetch origin main
          git switch --force-create main origin/main
          rm .github/workflows/run-hardening-branch.yml
          git add -A
          git commit -m "ci: remove completed hardening starter"
          git push origin main
